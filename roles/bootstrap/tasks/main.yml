---
# Bootstrap role - Initial system setup
# Updates packages and installs essential tools

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: true

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  become: true

- name: Check which essential packages are installed
  ansible.builtin.command:
    cmd: "dpkg-query -W -f='${Status}' {{ item }}"
  register: package_check
  loop:
    - vim
    - curl
    - wget
    - git
    - htop
  changed_when: false
  failed_when: false

- name: Install missing essential packages
  ansible.builtin.apt:
    name: "{{ item.item }}"
    state: present
  become: true
  loop: "{{ package_check.results }}"
  when: item.rc != 0 or 'install ok installed' not in item.stdout
