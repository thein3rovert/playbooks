---
- name: Manage tailscale service
  ansible.builtin.systemd:
    name: "{{ tailscale_service_name }}"
    state: "{{ tailscale_service_state }}"

- name: Start tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    state: started
  tags: [systemd, tailscale-start]

- name: Stop tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    state: stopped
  ignore_errors: yes
  tags: [systemd, tailscale-stop]

- name: Restart tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    state: restarted
  tags: [systemd, tailscale-restart]

- name: Manage tailscale service
  ansible.builtin.systemd:
    name: "{{ traefik_service_name }}"
    state: "{{ traefik_service_state }}"

- name: Start Traefik service
  ansible.builtin.systemd:
    name: traefik
    state: started
  tags: [systemd, traefik, traefik-start]

- name: Stop Traefik service
  ansible.builtin.systemd:
    name: traefik
    state: stopped
  ignore_errors: yes
  tags: [systemd, traefik, traefik-stop]

- name: Restart Traefik service
  ansible.builtin.systemd:
    name: traefik
    state: restarted
  tags: [systemd, traefik,traefik-restart]


