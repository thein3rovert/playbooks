--- 
# Simple playbook to manage user and groups
- name: Ensure group 'users' exists
  ansible.builtin.group:
    name: "{{ default_group }}"
    state: present
  become: true

- name: Ensure user 'thein3rovert' exist and is part of the 'users'
  ansible.builtin.user:
    name: "{{ default_user }}"
    groups: users
    state: present
  become: true

- name: Ensure .ssh directory exists for user
  ansible.builtin.file:
    path: "{{ssh_path}}"
    state: directory
    owner: "{{ default_user }}"
    group: "{{ default_group }}"
    mode: "{{ default_user_permission }}"

- name: Add authorized key for user
  authorized_key:
    user: "{{ default_user }}"
    state: present
    key: "{{ ssh_pub_key }}"

- name: Set correct permissions on authorized_keys
  ansible.builtin.file:
    path: "{{ authorized_keys_path }}"
    owner: "{{ default_user }}"
    group: "{{ default_group }}"
    mode: "{{ authorized_keys_permission }}"

- name: Harden SSH daemon configuration
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED SSH HARDENING"
    block: |
      PasswordAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      KbdInteractiveAuthentication no
      UsePAM yes
      AllowUsers {{ default_user }}
      X11Forwarding no
      MaxAuthTries 3
  notify: Restart ssh
